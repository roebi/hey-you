name: Publish

# Trigger: create a GitHub Release (tag v0.1.0, v0.2.0, ...)
# Trusted publishing — no PyPI token needed.
# Setup once on PyPI:
#   pypi.org → your project → Publishing → Add trusted publisher
#   Owner: roebi  Repo: hey-you  Workflow: publish.yml  Environment: pypi
on:
  release:
    types: [published]

jobs:
  test:
    name: "Test before publish"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project + dev dependencies
        run: uv sync --all-extras --dev

      - name: Test (pytest)
        run: uv run pytest tests/ -v

  publish:
    name: "Build and publish to PyPI"
    runs-on: ubuntu-latest
    needs: test                   # only publish if tests pass

    environment:
      name: pypi
      url: https://pypi.org/project/hey-you/

    permissions:
      id-token: write             # required for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        run: uv publish
