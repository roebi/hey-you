name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # triggers on: git tag v0.1.0 && git push --tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch

      - name: Build dist
        run: hatch build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi   # requires a GitHub environment named "pypi"
    permissions:
      id-token: write   # required for trusted publishing (no API key needed)

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no PYPI_API_TOKEN secret needed.
        # Set up at: https://pypi.org/manage/account/publishing/
